services:
  - type: web
    name: restola-backend
    env: python
    buildCommand: pip install -r restola-backend/requirements.txt
    startCommand: cd restola-backend && gunicorn -c gunicorn_config.py app:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
